services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=PocketLedgerDb;User=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True
      - Jwt__Secret=${JWT_SECRET:-PocketLedger_Docker_SuperSecret_Key_2024_AtLeast32Chars!!}
      - Jwt__Issuer=PocketLedger
      - Jwt__Audience=PocketLedgerApp
      - FrontendUrl=${FRONTEND_URL:-http://localhost:3000}
      - Cors__AllowedOrigins__0=http://localhost:3000
      - Cors__AllowedOrigins__1=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  client:
    build:
      context: PocketLedger.Client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlserver-data:
